# Rate limiting zone (edge defense in addition to app-level limits).
limit_req_zone $binary_remote_addr zone=deepscrape_rl:10m rate=10r/s;

# Set SERVER_NAME to your real domain when deploying.
server {
  listen 80;
  server_name _;

  # ACME challenge for Let's Encrypt cert issuance/renewal.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect everything else to HTTPS.
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name _;

  ssl_certificate /etc/letsencrypt/live/deepscrapper.ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/deepscrapper.ai/privkey.pem;

  # TLS hardening.
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Security headers.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  # Request body cap (matches the app's MAX_BODY_SIZE; big enough for batch URL lists).
  client_max_body_size 2m;

  location / {
    limit_req zone=deepscrape_rl burst=20 nodelay;

    proxy_pass http://deepscrape:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Scrapes and LLM extraction can take a while; don't 504 a legitimate slow scrape.
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }
}
